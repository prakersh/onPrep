{% extends "base.html" %}
{% block title %}Set Deadline — onPrep{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-12">
    <div class="text-center mb-8">
        <svg class="w-10 h-10 text-indigo-500/40 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/></svg>
        <h1 class="text-xl font-semibold">Set Interview Date</h1>
        <p class="text-sm text-slate-400 dark:text-slate-500 mt-1">We'll generate a study schedule for you</p>
    </div>

    <form method="POST" action="/planner/setup" class="space-y-4">
        <div>
            <label for="language_id" class="block text-sm font-medium mb-1.5">Language</label>
            <select name="language_id" id="language_id" class="w-full rounded-lg border border-slate-200 dark:border-white/10 bg-white dark:bg-white/[.03] px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500/50 cursor-pointer">
                {% for lang in languages %}<option value="{{ lang.id }}">{{ lang.name }}</option>{% endfor %}
            </select>
        </div>
        <div>
            <label for="interview_date" class="block text-sm font-medium mb-1.5">Interview Date</label>
            <input type="date" name="interview_date" id="interview_date" required
                class="w-full rounded-lg border border-slate-200 dark:border-white/10 bg-white dark:bg-white/[.03] px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500/50">
        </div>
        <button type="submit" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-medium py-2.5 rounded-lg cursor-pointer">Generate Schedule</button>
    </form>
</div>
{% endblock %}
