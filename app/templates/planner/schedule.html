{% extends "base.html" %}
{% block title %}Schedules — awesomePrep{% endblock %}
{% block content %}
<div class="mt-4 mb-6 flex items-end justify-between fade-up">
    <div>
        <h1 class="font-display text-3xl tracking-tight">Study Schedules</h1>
        <p id="schedule-count" class="text-base text-surface-800/40 dark:text-surface-200/30 mt-0.5">0 active interviews</p>
    </div>
    <a href="/planner/setup" class="text-sm text-accent hover:text-accent-500 font-medium cursor-pointer">Manage interviews &rarr;</a>
</div>

<div id="schedule-content">
    <div class="flex flex-col items-center justify-center py-20 text-center fade-up" style="animation-delay:.06s">
        <svg class="w-12 h-12 text-surface-300 dark:text-surface-200/10 mb-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/></svg>
        <p class="text-base text-surface-800/25 dark:text-surface-200/20 mb-4">No active schedules</p>
        <a href="/planner/setup" class="bg-accent hover:bg-accent-500 text-white text-sm font-medium px-5 py-2 rounded-xl cursor-pointer">Add Interview</a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    var STORAGE_KEY = 'awesomeprep:deadlines';
    var COLOR_MAP = {
        'indigo': '#6366f1', 'emerald': '#10b981', 'rose': '#f43f5e',
        'amber': '#f59e0b', 'cyan': '#06b6d4', 'violet': '#8b5cf6',
        'orange': '#f97316', 'teal': '#14b8a6'
    };

    function getDeadlines() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
    }

    function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    var deadlines = getDeadlines();
    deadlines.sort(function(a, b) { return a.interview_date.localeCompare(b.interview_date); });

    var countEl = document.getElementById('schedule-count');
    countEl.textContent = deadlines.length + ' active interview' + (deadlines.length !== 1 ? 's' : '');

    if (deadlines.length > 0) {
        var container = document.getElementById('schedule-content');
        var html = '<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">';
        deadlines.forEach(function(d, i) {
            var colorHex = COLOR_MAP[d.color] || '#6366f1';
            var itemCount = d.schedule ? d.schedule.length : 0;
            var dateObj = new Date(d.interview_date + 'T00:00:00');
            var dateStr = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            html += '<a href="/planner/schedule/detail?id=' + d.id + '" class="group rounded-2xl border border-surface-200/60 dark:border-white/[.06] bg-white/50 dark:bg-white/[.02] p-5 hover:border-accent-200 dark:hover:border-accent/20 cursor-pointer card-hover fade-up" style="animation-delay:' + (i * 0.06) + 's">' +
                '<div class="flex items-center gap-3 mb-3">' +
                '<div class="w-2.5 h-2.5 rounded-full" style="background:' + colorHex + '"></div>' +
                '<div class="text-base font-semibold group-hover:text-accent">' + escapeHtml(d.company_name) + '</div>' +
                '</div>' +
                '<div class="text-sm text-surface-800/40 dark:text-surface-200/30">' +
                (d.role ? escapeHtml(d.role) + ' &middot; ' : '') + escapeHtml(d.language_name) +
                '</div>' +
                '<div class="text-sm text-surface-800/40 dark:text-surface-200/30 mt-0.5">' + dateStr + '</div>' +
                '<div class="mt-3 text-xs text-surface-800/25 dark:text-surface-200/20">' + itemCount + ' items scheduled</div>' +
                '</a>';
        });
        html += '</div>';
        container.innerHTML = html;
    }
})();
</script>
{% endblock %}
